spring:
  application:
    name: multi-agent-ai-debate-system

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: 8080

debate:
  execution:
    thread-pool-size: 6
  retry:
    max-attempts: 1
    backoff-millis: 200
  timeout:
    per-agent-millis: 10000
  llm:
    timeout-millis: 8000
    max-attempts: 2
    providers:
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: https://api.openai.com/v1/chat/completions
        model: gpt-4o-mini
      anthropic:
        api-key: ${ANTHROPIC_API_KEY:}
        base-url: https://api.anthropic.com/v1/messages
        model: claude-3-haiku-20240307
    agents:
      optimist:
        provider: openai
        temperature: 0.8
      skeptic:
        provider: anthropic
        temperature: 0.3
      risk:
        provider: openai
        temperature: 0.2
      moderator:
        provider: anthropic
        temperature: 0.4
